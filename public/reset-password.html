<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reset Password — Respawn Signal</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root { --accent:#5AA0E8; --accent-dark:#3b82c4; --accent-dim:rgba(90,160,232,0.08); --accent-glow:rgba(90,160,232,0.2); --border:#e2e8f0; --surface:#ffffff; --surface2:#f1f5f9; --text:#0f172a; --text2:#475569; --text3:#94a3b8; --red:#dc2626; --green:#059669; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f8fafc; font-family:'Sora',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:36px 40px; width:100%; max-width:420px; box-shadow:0 4px 24px rgba(0,0,0,0.06); }
.logo { font-size:20px; font-weight:800; text-align:center; margin-bottom:24px; }
.logo span { color:var(--accent); }
h2 { font-size:16px; font-weight:700; margin-bottom:6px; }
p { font-size:13px; color:var(--text2); margin-bottom:20px; }
label { font-family:monospace; font-size:10px; color:var(--accent); letter-spacing:1.5px; text-transform:uppercase; display:block; margin-bottom:6px; }
input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Sora',sans-serif; font-size:14px; padding:11px 14px; outline:none; margin-bottom:14px; }
input:focus { border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px var(--accent-dim); }
button { width:100%; background:var(--accent); border:none; border-radius:9px; color:white; font-family:'Sora',sans-serif; font-size:14px; font-weight:700; padding:13px; cursor:pointer; box-shadow:0 3px 12px var(--accent-glow); }
button:hover { background:var(--accent-dark); }
button:disabled { opacity:0.5; cursor:not-allowed; }
.msg { font-size:12px; margin-top:12px; text-align:center; font-family:monospace; }
.success { color:var(--green); }
.error { color:var(--red); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Respawn<span>Signal</span></div>
  <h2>Set New Password</h2>
  <p>Enter your new password below.</p>
  <label>New Password</label>
  <input type="password" id="pw1" placeholder="••••••••" />
  <label>Confirm Password</label>
  <input type="password" id="pw2" placeholder="••••••••" />
  <button id="btn" onclick="resetPassword()">Update Password</button>
  <div class="msg" id="msg"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const sb = supabase.createClient(
  'https://ehkvtwvtmvgtkqqotujo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoa3Z0d3Z0bXZndGtxcW90dWpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NjEzODksImV4cCI6MjA4OTEzNzM4OX0.u7GA8thsQfpD1hdnQuocENuYaH79Y277AOm2Trg4Yz4'
);

// Exchange token from URL hash
const hash = new URLSearchParams(window.location.hash.substring(1));
const accessToken = hash.get('access_token');
if (accessToken) {
  sb.auth.setSession({ access_token: accessToken, refresh_token: hash.get('refresh_token') });
}

async function resetPassword() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn');

  if (!pw1 || pw1.length < 6) { msg.className='msg error'; msg.textContent='Password must be at least 6 characters.'; return; }
  if (pw1 !== pw2) { msg.className='msg error'; msg.textContent='Passwords do not match.'; return; }

  btn.disabled = true;
  btn.textContent = 'Updating...';

  const { error } = await sb.auth.updateUser({ password: pw1 });
  if (error) {
    msg.className = 'msg error';
    msg.textContent = error.message;
    btn.disabled = false;
    btn.textContent = 'Update Password';
  } else {
    msg.className = 'msg success';
    msg.textContent = '✓ Password updated! Redirecting to login...';
    setTimeout(() => window.location.href = '/', 2000);
  }
}
</script>
</body>
</html>
