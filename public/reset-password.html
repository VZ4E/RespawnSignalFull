<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Respawn Signal</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --accent:#5AA0E8; --accent-dark:#3b82c4; --accent-dim:rgba(90,160,232,0.08); --accent-glow:rgba(90,160,232,0.2); --bg:#f8fafc; --surface:#ffffff; --border:#e2e8f0; --text:#0f172a; --text2:#475569; --text3:#94a3b8; --red:#dc2626; --green:#059669; --green-dim:rgba(5,150,105,0.08); }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); font-family:'Sora',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:36px 40px; width:100%; max-width:420px; box-shadow:0 4px 24px rgba(0,0,0,0.06); }
.logo { font-size:20px; font-weight:800; text-align:center; margin-bottom:24px; }
.logo span { color:var(--accent); }
.label { font-family:'DM Mono',monospace; font-size:10px; color:var(--accent); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:6px; display:block; }
input { width:100%; background:#f1f5f9; border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Sora',sans-serif; font-size:14px; padding:11px 14px; outline:none; transition:all 0.15s; margin-bottom:14px; }
input:focus { border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px var(--accent-dim); }
.btn { width:100%; background:var(--accent); border:none; border-radius:9px; color:white; font-family:'Sora',sans-serif; font-size:14px; font-weight:700; padding:13px; cursor:pointer; transition:all 0.15s; box-shadow:0 3px 12px var(--accent-glow); }
.btn:hover { background:var(--accent-dark); }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.error { color:var(--red); font-size:12px; font-family:'DM Mono',monospace; margin-top:10px; text-align:center; }
.success { background:var(--green-dim); border:1px solid rgba(5,150,105,0.2); color:var(--green); border-radius:8px; padding:12px 16px; font-size:13px; margin-top:12px; text-align:center; display:none; }
.back { text-align:center; margin-top:16px; font-size:12px; color:var(--text3); cursor:pointer; }
.back a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Respawn<span>Signal</span></div>
  <div style="font-size:14px;font-weight:700;margin-bottom:6px">Set new password</div>
  <div style="font-size:13px;color:var(--text2);margin-bottom:20px">Choose a strong password for your account.</div>
  <label class="label">New Password</label>
  <input type="password" id="new-password" placeholder="••••••••" />
  <label class="label">Confirm Password</label>
  <input type="password" id="confirm-password" placeholder="••••••••" />
  <button class="btn" id="reset-btn" onclick="resetPassword()">Update Password</button>
  <div class="error" id="error"></div>
  <div class="success" id="success">✓ Password updated! <a href="/">Sign in</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const sb = supabase.createClient(
  'https://ehkvtwvtmvgtkqqotujo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoa3Z0d3Z0bXZndGtxcW90dWpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NjEzODksImV4cCI6MjA4OTEzNzM4OX0.u7GA8thsQfpD1hdnQuocENuYaH79Y277AOm2Trg4Yz4'
);

// Handle hash token from email link
const hash = window.location.hash?.substring(1);
if (hash) {
  const params = new URLSearchParams(hash);
  const accessToken = params.get('access_token');
  const refreshToken = params.get('refresh_token');
  if (accessToken) {
    sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
  }
}

async function resetPassword() {
  const pwd = document.getElementById('new-password').value;
  const confirm = document.getElementById('confirm-password').value;
  const errEl = document.getElementById('error');
  const btn = document.getElementById('reset-btn');

  errEl.textContent = '';
  if (!pwd || pwd.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }
  if (pwd !== confirm) { errEl.textContent = 'Passwords do not match.'; return; }

  btn.disabled = true;
  btn.textContent = 'Updating...';

  try {
    const { error } = await sb.auth.updateUser({ password: pwd });
    if (error) throw error;
    document.getElementById('success').style.display = 'block';
    btn.style.display = 'none';
  } catch(e) {
    errEl.textContent = e.message || 'Failed to update password.';
    btn.disabled = false;
    btn.textContent = 'Update Password';
  }
}
</script>
</body>
</html>
