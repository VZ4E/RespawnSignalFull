<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Profile — Respawn Signal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Colors */
  --color-background-primary: #ffffff;
  --color-background-secondary: #f8fafc;
  --color-text-primary: #0f172a;
  --color-text-secondary: #475569;
  --color-text-tertiary: #94a3b8;
  --color-border-primary: #e2e8f0;
  --color-border-secondary: #cbd5e1;
  --color-border-tertiary: #f1f5f9;
  
  /* Info (blue) */
  --color-background-info: #eff6ff;
  --color-text-info: #0c4a6e;
  
  /* Success (green) */
  --color-background-success: #f0fdf4;
  --color-text-success: #166534;
  
  /* Warning (amber) */
  --color-background-warning: #fef3c7;
  --color-text-warning: #92400e;
  
  /* Platform colors */
  --color-twitch-bg: #EDE9FF;
  --color-twitch-text: #4B35B8;
  --color-tiktok-bg: #F0F0F0;
  --color-tiktok-text: #000000;
  --color-youtube-bg: #FFEAEA;
  --color-youtube-text: #B91C1C;
  --color-instagram-bg: #FFF0F7;
  --color-instagram-text: #BE185D;
  
  /* Activation badge */
  --color-activation-bg: #FFF3E0;
  --color-activation-text: #E65100;
  
  /* Fonts */
  --font-sans: 'Inter', sans-serif;
  --font-mono: 'Courier Prime', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body { 
  background: var(--color-background-secondary); 
  color: var(--color-text-primary); 
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.6;
}

/* ── LAYOUT ── */
#app { 
  display: flex; 
  flex-direction: column; 
  height: 100vh; 
}

/* ── HEADER ── */
.brand-header {
  background: var(--color-background-primary);
  border-bottom: 1px solid var(--color-border-primary);
  padding: 32px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
}

.brand-header-left {
  flex: 1;
}

.brand-header-title {
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.5px;
  color: var(--color-text-primary);
  margin: 0;
}

.brand-header-right {
  display: flex;
  gap: 12px;
}

/* ── BUTTONS ── */
.btn-primary {
  background: var(--color-text-primary);
  color: white;
  border: none;
  border-radius: 6px;
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-primary:hover:not(:disabled) {
  background: #1f2937;
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ── STAT CARDS ── */
.stat-cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  padding: 32px 48px;
  background: var(--color-background-primary);
  border-bottom: 1px solid var(--color-border-primary);
}

.stat-card {
  background: var(--color-background-secondary);
  border-radius: 8px;
  padding: 24px;
  text-align: left;
}

.stat-value {
  font-size: 26px;
  font-weight: 600;
  color: var(--color-text-primary);
  margin-bottom: 8px;
}

.stat-label {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
}

/* ── CONTENT ── */
.content-inner {
  flex: 1;
  overflow-y: auto;
  padding: 32px 48px;
}

/* ── CREATOR SECTIONS ── */
.creator-section {
  margin-bottom: 32px;
}

.creator-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 0.5px solid var(--color-border-tertiary);
}

.creator-handle {
  font-size: 15px;
  font-weight: 600;
  color: var(--color-text-primary);
}

.platform-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 6px;
  font-size: 0;
  flex-shrink: 0;
}

.platform-badge img {
  width: 16px;
  height: 16px;
  display: block;
}

.platform-twitch { background: var(--color-twitch-bg); }
.platform-tiktok { background: var(--color-tiktok-bg); }
.platform-youtube { background: var(--color-youtube-bg); }
.platform-instagram { background: var(--color-instagram-bg); }

/* ── DEAL CARDS ── */
.deal-card {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-primary);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
  animation: slideUp 0.2s ease both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.deal-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.deal-left {
  flex: 1;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.deal-type-pill {
  display: inline-flex;
  align-items: center;
  background: var(--color-background-info);
  border: 0.5px solid var(--color-border-primary);
  border-radius: 4px;
  padding: 4px 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-text-info);
  font-weight: 600;
}

.post-type-label {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  color: var(--color-text-secondary);
  font-family: var(--font-mono);
  letter-spacing: 0.3px;
}

.activation-badge {
  display: inline-flex;
  align-items: center;
  background: var(--color-activation-bg);
  border: 0.5px solid rgba(230, 81, 0, 0.2);
  border-radius: 4px;
  padding: 4px 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-activation-text);
  font-weight: 600;
}

.conf-pill {
  display: inline-flex;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 4px;
  flex-shrink: 0;
  font-weight: 600;
  border: 0.5px solid transparent;
}

.conf-high {
  background: var(--color-background-success);
  color: var(--color-text-success);
  border-color: rgba(22, 101, 52, 0.2);
}

.conf-mid {
  background: var(--color-background-warning);
  color: var(--color-text-warning);
  border-color: rgba(146, 64, 14, 0.2);
}

.conf-low {
  background: #fee2e2;
  color: #991b1b;
  border-color: rgba(153, 27, 27, 0.2);
}

.deal-evidence {
  font-size: 13px;
  color: var(--color-text-secondary);
  border-left: 2px solid var(--color-border-secondary);
  padding-left: 12px;
  line-height: 1.6;
  font-style: italic;
  margin: 10px 0;
  color: var(--color-text-tertiary);
}

.deal-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-top: 12px;
  font-size: 12px;
  color: var(--color-text-tertiary);
  font-family: var(--font-mono);
}

.deal-meta-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.deal-platform-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border-radius: 4px;
  flex-shrink: 0;
}

.deal-platform-badge img {
  width: 14px;
  height: 14px;
  display: block;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 80px 40px;
  color: var(--color-text-tertiary);
}

.empty-state-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.4;
}

.empty-state-text {
  font-size: 16px;
  margin-bottom: 24px;
  color: var(--color-text-secondary);
}

.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-primary);
  border-radius: 6px;
  color:var(--text2); text-decoration:none; font-size:13px; font-weight:600;
  cursor:pointer; transition:all 0.13s;
}
.btn-back:hover { background:var(--border); color:var(--text); }

/* ── LOADING ── */
.loading-spinner {
  display:flex; align-items:center; justify-content:center; padding:40px;
  font-size:13px; color:var(--text3);
}
.spinner {
  width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent);
  border-radius:50%; animation:spin 0.8s linear infinite; margin-right:10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── ERROR ── */
.error-state {
  background:var(--red-dim); border:1px solid rgba(220,38,38,0.2); border-radius:8px;
  padding:16px; color:var(--red); margin-bottom:16px; font-size:13px;
}
</style>
</head>
<body>

<div id="app">
  <div class="brand-header" id="header">
    <!-- Brand name + Generate Report button -->
  </div>
  
  <div class="stat-cards" id="stats">
    <!-- 4 stat cards -->
  </div>
  
  <div class="content-inner" id="content">
    <!-- Deal cards grouped by creator -->
  </div>
</div>

<script>
// Get brand name from URL
const urlParams = new URLSearchParams(window.location.search);
const brandNameEncoded = window.location.pathname.split('/').pop();
const brandName = decodeURIComponent(brandNameEncoded);

function navTo(path) {
  window.location.href = path;
}

// Fetch brand data
// Helper: Parse JWT token
function parseJWT(tokenStr) {
  try {
    const base64Url = tokenStr.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    const jsonPayload = decodeURIComponent(
      atob(base64)
        .split('')
        .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
        .join('')
    );
    return JSON.parse(jsonPayload);
  } catch (e) {
    return null;
  }
}

// Helper: Check if token is expired (with 5-min buffer)
function isTokenExpired(tokenStr) {
  if (!tokenStr) return true;
  const decoded = parseJWT(tokenStr);
  if (!decoded || !decoded.exp) return true;
  const expiresAt = decoded.exp * 1000;
  const bufferMs = 5 * 60 * 1000; // 5 minutes before actual expiry
  return expiresAt - bufferMs < Date.now();
}

// Helper: Refresh access token
async function refreshAccessToken() {
  const refreshToken = localStorage.getItem('refreshToken');
  if (!refreshToken) {
    throw new Error('No refresh token available. Please log in again.');
  }

  try {
    const res = await fetch('/api/auth/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refreshToken }),
    });

    if (!res.ok) {
      throw new Error('Refresh failed: ' + res.statusText);
    }

    const { accessToken, refreshToken: newRefreshToken } = await res.json();
    localStorage.setItem('rs_token', accessToken);
    if (newRefreshToken) {
      localStorage.setItem('refreshToken', newRefreshToken);
    }

    console.log('[Brand Profile] Token refreshed successfully');
    return accessToken;
  } catch (err) {
    console.error('[Brand Profile] Token refresh error:', err);
    localStorage.removeItem('rs_token');
    localStorage.removeItem('refreshToken');
    throw err;
  }
}

// Helper: Get valid token (refresh if expired)
async function getValidToken() {
  let currentToken = localStorage.getItem('rs_token');
  
  if (!currentToken) {
    throw new Error('No access token. Please log in.');
  }

  if (isTokenExpired(currentToken)) {
    console.log('[Brand Profile] Token expired, refreshing...');
    currentToken = await refreshAccessToken();
  }

  return currentToken;
}

async function loadBrandProfile() {
  const contentEl = document.getElementById('content');
  const headerEl = document.getElementById('header');
  const statsEl = document.getElementById('stats');
  
  try {
    contentEl.innerHTML = '<div class="loading-spinner"><div class="spinner"></div>Loading brand profile...</div>';
    
    // Refresh token if expired, then get valid token
    const token = await getValidToken();
    
    if (!token) {
      throw new Error('Not authenticated. Please log in first.');
    }
    
    console.log(`[Brand Profile] Fetching /api/brands/${encodeURIComponent(brandName)}`);
    
    const response = await fetch(`/api/brands/${encodeURIComponent(brandName)}`, {
      headers: {
        'Authorization': `Bearer ${token}`
      }
    });

    console.log('[Brand Profile] Response status:', response.status);
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }

    const data = await response.json();
    console.log('[Brand Profile] Response data - brand:', data.brand_name, 'total_deals:', data.total_deals);

    if (data.total_deals === 0) {
      renderEmptyState(headerEl, contentEl, data.brand_name);
      return;
    }

    renderHeader(headerEl, data);
    renderStats(statsEl, data);
    renderTimeline(contentEl, data);

  } catch (err) {
    console.error('[Brand Profile] Error:', err);
    contentEl.innerHTML = `<div class="error-state">
      Failed to load brand profile: ${err.message}
    </div>`;
  }
}

function renderHeader(el, data) {
  el.innerHTML = `
    <div class="brand-header-left">
      <h1 class="brand-header-title">${escapeHtml(data.brand_name)}</h1>
    </div>
    <div class="brand-header-right">
      <button class="btn-primary" id="generate-report-btn" onclick="generateBrandReport()">Generate Report</button>
    </div>
  `;
}

function renderStats(el, data) {
  el.innerHTML = `
    <div class="stat-card">
      <div class="stat-value">${data.total_deals}</div>
      <div class="stat-label">Total Deals</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${data.creators_count}</div>
      <div class="stat-label">Creators</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${data.high_confidence_deals}</div>
      <div class="stat-label">High Confidence</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${data.activation_streams}</div>
      <div class="stat-label">Activation Streams</div>
    </div>
  `;
}

function renderTimeline(el, data) {
  // Group deals by username
  const grouped = {};
  data.deals.forEach(deal => {
    if (!grouped[deal.username]) {
      grouped[deal.username] = [];
    }
    grouped[deal.username].push(deal);
  });

  // Sort each creator's deals by date (newest first)
  Object.values(grouped).forEach(deals => {
    deals.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  });

  // Render each creator section
  const html = Object.entries(grouped).map(([username, deals]) => {
    const platformClass = `platform-${deals[0].platform}`;
    const platformUpper = deals[0].platform.toUpperCase();
    
    const dealsHtml = deals.map((deal, i) => {
      // Add fallbacks for fields that might be missing in older records
      const dealType = deal.deal_type || 'Partnership';
      const postType = deal.post_type || 'Unknown';
      const evidence = deal.evidence || '';
      const confidence = deal.confidence || 'medium';
      
      const confClass = confidence === 'high' ? 'conf-high' : 
                        confidence === 'medium' ? 'conf-mid' : 'conf-low';
      
      const dateStr = new Date(deal.created_at).toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
      
      const activationBadge = deal.is_activation_day ? 
        '<div class="activation-badge">Activation Stream</div>' : '';
      
      return `
        <div class="deal-card" style="animation-delay:${i*0.05}s">
          <div class="deal-top">
            <div class="deal-left">
              <span class="deal-type-pill">${escapeHtml(dealType)}</span>
              <span class="post-type-label">${escapeHtml(postType)}</span>
              ${activationBadge}
            </div>
            <div class="conf-pill ${confClass}">${confidence}</div>
          </div>
          ${evidence ? `<div class="deal-evidence">"${escapeHtml(evidence)}"</div>` : ''}
          <div class="deal-meta">
            <div class="deal-meta-left">
              📅 ${dateStr}
            </div>
            <span class="deal-platform-badge ${platformClass}">
              ${getPlatformLogoHtml(deal.platform)}
            </span>
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="creator-section">
        <div class="creator-header">
          <span class="creator-handle">${escapeHtml(username)}</span>
          <div class="platform-badge ${platformClass}" title="${platformUpper}">
            ${getPlatformLogoHtml(deals[0].platform)}
          </div>
        </div>
        ${dealsHtml}
      </div>
    `;
  }).join('');

  el.innerHTML = html;
}

function renderEmptyState(headerEl, contentEl, brandName) {
  headerEl.innerHTML = `
    <div class="brand-header-left">
      <h1 class="brand-header-title">${escapeHtml(brandName)}</h1>
    </div>
  `;
  
  contentEl.innerHTML = `
    <div class="empty-state">
      <div class="empty-state-icon">📭</div>
      <div class="empty-state-text">No deals found for <strong>${escapeHtml(brandName)}</strong></div>
      <a href="/" class="btn-back">← Back to Dashboard</a>
    </div>
  `;
}

function escapeHtml(text) {
  const map = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  };
  return text.replace(/[&<>"']/g, m => map[m]);
}

// Helper: Get platform logo URL and icon markup
function getPlatformLogoHtml(platform) {
  const logoMap = {
    twitch: 'https://static.twitchcdn.net/assets/favicon-32-e29e246014dbe109c62deda555444bb2.png',
    tiktok: 'https://www.tiktok.com/favicon.ico',
    youtube: 'https://www.youtube.com/s/desktop/d8988b98/img/favicon.ico',
    instagram: 'https://www.instagram.com/static/images/ico/favicon.ico/36b3ee2d91ed.ico'
  };
  
  const url = logoMap[platform.toLowerCase()];
  if (!url) return platform.toUpperCase().slice(0, 1);
  
  return `<img src="${url}" width="16" height="16" alt="${platform}" style="display:block">`;
}

// Generate and download brand report
async function generateBrandReport() {
  const btn = document.getElementById('generate-report-btn');
  let token;
  
  try {
    // Refresh token if expired, then get valid token
    token = await getValidToken();
    
    if (!token) {
      alert('Not authenticated. Please log in first.');
      return;
    }
  } catch (err) {
    console.error('[Brand Report] Token error:', err);
    alert('Token refresh failed. Please log in again.');
    return;
  }
  
  if (!brandName) {
    alert('Brand name not found.');
    return;
  }
  
  // Disable button and show loading state
  btn.disabled = true;
  btn.textContent = '⏳ Generating...';
  
  try {
    // Call the report endpoint
    const response = await fetch(`/api/brands/${encodeURIComponent(brandName)}/report`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        format: 'json',
        include_evidence: true
      })
    });
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }
    
    const reportData = await response.json();
    
    if (!reportData.content) {
      throw new Error('No report content received');
    }
    
    // Generate HTML report from content
    downloadBrandReportPDF(brandName, reportData.content);
    
    // Update button
    btn.textContent = '✓ Report Generated';
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = 'Generate Report';
    }, 2000);
    
  } catch (error) {
    console.error('[Brand Report] Error:', error);
    btn.disabled = false;
    btn.textContent = 'Generate Report';
    alert(`Failed to generate report: ${error.message}`);
  }
}

// Download brand report as PDF
function downloadBrandReportPDF(brandName, content) {
  // Generate HTML report
  const html = generateBrandReportHTML(brandName, content);
  
  // Create blob and download
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  
  // Format date for filename
  const dateStr = new Date().toISOString().split('T')[0];
  link.download = `${brandName}-report-${dateStr}.html`;
  link.href = url;
  
  link.click();
  URL.revokeObjectURL(url);
  
  console.log(`[Brand Report] Downloaded: ${link.download}`);
}

// Generate HTML report from content
function generateBrandReportHTML(brandName, content) {
  const {
    total_deals = 0,
    creators_count = 0,
    high_confidence_deals = 0,
    activation_streams = 0,
    platform_breakdown = {},
    deal_types = [],
    post_types = [],
    date_range = {},
    deals = []
  } = content;
  
  const reportDate = new Date().toLocaleDateString('en-US', {
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  });
  
  const earliestDate = date_range.earliest ? new Date(date_range.earliest).toLocaleDateString() : 'N/A';
  const latestDate = date_range.latest ? new Date(date_range.latest).toLocaleDateString() : 'N/A';
  
  // Group deals by creator
  const dealsByCreator = {};
  deals.forEach(deal => {
    if (!dealsByCreator[deal.username]) {
      dealsByCreator[deal.username] = [];
    }
    dealsByCreator[deal.username].push(deal);
  });
  
  // Platform breakdown HTML
  const platformBreakdownHtml = Object.entries(platform_breakdown)
    .map(([platform, count]) => `<li>${platform.toUpperCase()}: <strong>${count}</strong> deals</li>`)
    .join('');
  
  // Deals table HTML
  const dealsTableHtml = Object.entries(dealsByCreator)
    .map(([creator, creatorDeals]) => {
      const dealsHtml = creatorDeals.map(d => `
        <tr>
          <td>${d.deal_type || 'Unknown'}</td>
          <td>${d.post_type || 'Unknown'}</td>
          <td>${d.is_activation_day ? '✓ Activation' : '—'}</td>
          <td>${d.confidence || 'medium'}</td>
          <td>${d.evidence ? `"${d.evidence.substring(0, 100)}..."` : '—'}</td>
          <td>${new Date(d.created_at).toLocaleDateString()}</td>
        </tr>
      `).join('');
      
      const platformBadge = creatorDeals[0] ? creatorDeals[0].platform : 'Unknown';
      
      return `
        <tr style="background:#f5f5f5">
          <td colspan="6"><strong>@${creator}</strong> (${platformBadge?.toUpperCase() || 'Unknown'})</td>
        </tr>
        ${dealsHtml}
      `;
    })
    .join('');
