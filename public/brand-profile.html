<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Profile — Respawn Signal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8fafc; --sidebar: #ffffff; --surface: #ffffff; --surface2: #f1f5f9;
  --border: #e2e8f0; --border2: #cbd5e1;
  --accent: #5AA0E8; --accent-dark: #3b82c4; --accent-dim: rgba(90,160,232,0.08);
  --accent-mid: rgba(90,160,232,0.15); --accent-glow: rgba(90,160,232,0.2);
  --green: #059669; --green-dim: rgba(5,150,105,0.08);
  --amber: #d97706; --amber-dim: rgba(217,119,6,0.08);
  --orange: #f59e0b; --orange-dim: rgba(245,158,11,0.08);
  --red: #dc2626; --red-dim: rgba(220,38,38,0.08);
  --text: #0f172a; --text2: #475569; --text3: #94a3b8;
  --mono: 'DM Mono', monospace; --sans: 'Sora', sans-serif; --serif: 'Instrument Serif', serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); }

/* ── MAIN LAYOUT ── */
#app { display:flex; height:100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width:240px; background:var(--sidebar); border-right:1px solid var(--border);
  padding:16px; overflow-y:auto; flex-shrink:0;
}
.sidebar-logo { font-size:14px; font-weight:800; letter-spacing:-0.3px; margin-bottom:24px; cursor:pointer; }
.sidebar-logo span { color:var(--accent); }
.nav-item {
  display:block; width:100%; padding:10px 12px; margin-bottom:6px;
  background:transparent; border:none; border-radius:8px; text-align:left;
  font-family:var(--sans); font-size:13px; color:var(--text2); cursor:pointer;
  transition:all 0.13s;
}
.nav-item:hover { background:var(--surface2); color:var(--text); }
.nav-item.active { background:var(--accent-dim); color:var(--accent); }

/* ── MAIN CONTENT ── */
.main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.content-inner { flex:1; overflow-y:auto; padding:40px; }

/* ── HEADER ── */
.brand-header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:24px 40px; display:flex; align-items:center; justify-content:space-between;
  gap:24px;
}
.brand-header-left { flex:1; }
.brand-header-title { font-family:var(--serif); font-style:italic; font-size:36px; 
  letter-spacing:-0.5px; margin-bottom:16px; }
.stat-pills { display:flex; gap:16px; }
.stat-pill {
  background:var(--surface2); border:1px solid var(--border); border-radius:8px;
  padding:10px 16px; font-size:13px; color:var(--text2);
}
.stat-pill strong { color:var(--text); font-weight:600; }
.brand-header-right { display:flex; gap:12px; }
.btn-primary {
  background:var(--accent); border:none; border-radius:8px;
  padding:10px 20px; font-family:var(--sans); font-size:13px; font-weight:700;
  color:white; cursor:pointer; transition:all 0.13s;
  box-shadow:0 2px 8px var(--accent-glow);
}
.btn-primary:hover:not(:disabled) { background:var(--accent-dark); transform:translateY(-1px); }
.btn-primary:disabled {
  opacity:0.6; cursor:not-allowed; background:#9ca3af;
}
.btn-ghost {
  background:transparent; border:1px solid var(--border); border-radius:8px;
  padding:10px 20px; font-family:var(--sans); font-size:13px; font-weight:600;
  color:var(--text2); cursor:pointer; transition:all 0.13s;
}
.btn-ghost:hover { border-color:var(--accent); color:var(--accent); }

/* ── DEAL CARDS ── */
.creator-section { margin-bottom:32px; }
.creator-header {
  display:flex; align-items:center; gap:12px; margin-bottom:16px;
  padding-bottom:12px; border-bottom:1px solid var(--border);
}
.creator-handle { font-size:16px; font-weight:700; color:var(--text); }
.platform-badge {
  display:inline-flex; align-items:center; justify-content:center;
  width:28px; height:28px; border-radius:6px; font-size:11px; font-weight:700;
  color:white; font-family:var(--mono);
}
.platform-twitch { background:#9146ff; }
.platform-tiktok { background:#000000; }
.platform-youtube { background:#ff0000; }
.platform-instagram { background:#e4405f; }

.deal-card {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:16px 18px; margin-bottom:12px; animation:slideUp 0.2s ease both;
  box-shadow:0 1px 4px rgba(0,0,0,0.04);
}
@keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.deal-top {
  display:flex; justify-content:space-between; align-items:flex-start;
  gap:12px; margin-bottom:8px; flex-wrap:wrap;
}
.deal-left { flex:1; display:flex; gap:8px; align-items:center; }
.deal-type-pill {
  display:inline-flex; align-items:center; background:var(--accent-dim);
  border:1px solid var(--accent-mid); border-radius:6px; padding:4px 10px;
  font-family:var(--mono); font-size:10px; color:var(--accent); font-weight:600;
}
.post-type-label {
  display:inline-flex; align-items:center; font-size:11px; color:var(--text3);
  font-family:var(--mono); letter-spacing:0.5px;
}
.activation-badge {
  display:inline-flex; align-items:center; background:var(--orange-dim);
  border:1px solid rgba(245,158,11,0.2); border-radius:6px; padding:4px 10px;
  font-family:var(--mono); font-size:10px; color:var(--orange); font-weight:600;
}
.conf-pill { font-family:var(--mono); font-size:10px; padding:3px 9px; 
  border-radius:99px; flex-shrink:0; font-weight:500; }
.conf-high { background:var(--green-dim); color:var(--green); border:1px solid rgba(5,150,105,0.2); }
.conf-mid { background:var(--amber-dim); color:var(--amber); border:1px solid rgba(217,119,6,0.2); }
.conf-low { background:var(--red-dim); color:var(--red); border:1px solid rgba(220,38,38,0.2); }

.deal-evidence {
  font-size:13px; color:var(--text2); border-left:3px solid var(--accent-mid);
  padding-left:12px; line-height:1.6; font-style:italic; margin:8px 0;
  background:rgba(90,160,232,0.04); padding:10px 12px; border-radius:4px;
}

.deal-meta {
  display:flex; align-items:center; gap:12px; margin-top:10px;
  font-size:12px; color:var(--text3); font-family:var(--mono);
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align:center; padding:60px 40px; color:var(--text3);
}
.empty-state-icon { font-size:48px; margin-bottom:16px; opacity:0.5; }
.empty-state-text { font-size:16px; margin-bottom:24px; color:var(--text2); }
.btn-back {
  display:inline-flex; align-items:center; gap:6px; padding:10px 16px;
  background:var(--surface2); border:1px solid var(--border); border-radius:8px;
  color:var(--text2); text-decoration:none; font-size:13px; font-weight:600;
  cursor:pointer; transition:all 0.13s;
}
.btn-back:hover { background:var(--border); color:var(--text); }

/* ── LOADING ── */
.loading-spinner {
  display:flex; align-items:center; justify-content:center; padding:40px;
  font-size:13px; color:var(--text3);
}
.spinner {
  width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent);
  border-radius:50%; animation:spin 0.8s linear infinite; margin-right:10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── ERROR ── */
.error-state {
  background:var(--red-dim); border:1px solid rgba(220,38,38,0.2); border-radius:8px;
  padding:16px; color:var(--red); margin-bottom:16px; font-size:13px;
}
</style>
</head>
<body>

<div id="app">
  <div class="sidebar">
    <div class="sidebar-logo"><span>⚡</span> Respawn Signal</div>
    <button class="nav-item active" onclick="navTo('/')">Dashboard</button>
    <button class="nav-item" onclick="navTo('/brands')">Brands</button>
    <button class="nav-item" onclick="navTo('/settings')">Settings</button>
  </div>

  <div class="main-content">
    <div class="brand-header" id="header">
      <!-- Dynamically populated -->
    </div>
    <div class="content-inner" id="content">
      <!-- Dynamically populated -->
    </div>
  </div>
</div>

<script>
// Get brand name from URL
const urlParams = new URLSearchParams(window.location.search);
const brandNameEncoded = window.location.pathname.split('/').pop();
const brandName = decodeURIComponent(brandNameEncoded);

function navTo(path) {
  window.location.href = path;
}

// Fetch brand data
// Helper: Parse JWT token
function parseJWT(tokenStr) {
  try {
    const base64Url = tokenStr.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    const jsonPayload = decodeURIComponent(
      atob(base64)
        .split('')
        .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
        .join('')
    );
    return JSON.parse(jsonPayload);
  } catch (e) {
    return null;
  }
}

// Helper: Check if token is expired (with 5-min buffer)
function isTokenExpired(tokenStr) {
  if (!tokenStr) return true;
  const decoded = parseJWT(tokenStr);
  if (!decoded || !decoded.exp) return true;
  const expiresAt = decoded.exp * 1000;
  const bufferMs = 5 * 60 * 1000; // 5 minutes before actual expiry
  return expiresAt - bufferMs < Date.now();
}

// Helper: Refresh access token
async function refreshAccessToken() {
  const refreshToken = localStorage.getItem('refreshToken');
  if (!refreshToken) {
    throw new Error('No refresh token available. Please log in again.');
  }

  try {
    const res = await fetch('/api/auth/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refreshToken }),
    });

    if (!res.ok) {
      throw new Error('Refresh failed: ' + res.statusText);
    }

    const { accessToken, refreshToken: newRefreshToken } = await res.json();
    localStorage.setItem('rs_token', accessToken);
    if (newRefreshToken) {
      localStorage.setItem('refreshToken', newRefreshToken);
    }

    console.log('[Brand Profile] Token refreshed successfully');
    return accessToken;
  } catch (err) {
    console.error('[Brand Profile] Token refresh error:', err);
    localStorage.removeItem('rs_token');
    localStorage.removeItem('refreshToken');
    throw err;
  }
}

// Helper: Get valid token (refresh if expired)
async function getValidToken() {
  let currentToken = localStorage.getItem('rs_token');
  
  if (!currentToken) {
    throw new Error('No access token. Please log in.');
  }

  if (isTokenExpired(currentToken)) {
    console.log('[Brand Profile] Token expired, refreshing...');
    currentToken = await refreshAccessToken();
  }

  return currentToken;
}

async function loadBrandProfile() {
  const contentEl = document.getElementById('content');
  const headerEl = document.getElementById('header');
  
  try {
    contentEl.innerHTML = '<div class="loading-spinner"><div class="spinner"></div>Loading brand profile...</div>';
    
    // Refresh token if expired, then get valid token
    const token = await getValidToken();
    
    if (!token) {
      throw new Error('Not authenticated. Please log in first.');
    }
    
    console.log(`[Brand Profile] Fetching /api/brands/${encodeURIComponent(brandName)}`);
    
    const response = await fetch(`/api/brands/${encodeURIComponent(brandName)}`, {
      headers: {
        'Authorization': `Bearer ${token}`
      }
    });

    console.log('[Brand Profile] Response status:', response.status);
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }

    const data = await response.json();
    console.log('[Brand Profile] Response data - brand:', data.brand_name, 'total_deals:', data.total_deals);

    if (data.total_deals === 0) {
      renderEmptyState(headerEl, contentEl, data.brand_name);
      return;
    }

    renderHeader(headerEl, data);
    renderTimeline(contentEl, data);

  } catch (err) {
    console.error('[Brand Profile] Error:', err);
    contentEl.innerHTML = `<div class="error-state">
      Failed to load brand profile: ${err.message}
    </div>`;
  }
}

function renderHeader(el, data) {
  el.innerHTML = `
    <div class="brand-header-left">
      <h1 class="brand-header-title">${escapeHtml(data.brand_name)}</h1>
      <div class="stat-pills">
        <div class="stat-pill">
          <strong>${data.total_deals}</strong> Deal${data.total_deals !== 1 ? 's' : ''}
        </div>
        <div class="stat-pill">
          <strong>${data.creators_count}</strong> Creator${data.creators_count !== 1 ? 's' : ''}
        </div>
        <div class="stat-pill">
          <strong>${data.platforms.length}</strong> Platform${data.platforms.length !== 1 ? 's' : ''}
        </div>
      </div>
    </div>
    <div class="brand-header-right">
      <button class="btn-primary" id="generate-report-btn" onclick="generateBrandReport()">Generate Report</button>
    </div>
  `;
}

function renderTimeline(el, data) {
  // Group deals by username
  const grouped = {};
  data.deals.forEach(deal => {
    if (!grouped[deal.username]) {
      grouped[deal.username] = [];
    }
    grouped[deal.username].push(deal);
  });

  // Sort each creator's deals by date (newest first)
  Object.values(grouped).forEach(deals => {
    deals.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  });

  // Render each creator section
  const html = Object.entries(grouped).map(([username, deals]) => {
    const platformClass = `platform-${deals[0].platform}`;
    const platformUpper = deals[0].platform.toUpperCase();
    
    const dealsHtml = deals.map((deal, i) => {
      // Add fallbacks for fields that might be missing in older records
      const dealType = deal.deal_type || 'Partnership';
      const postType = deal.post_type || 'Unknown';
      const evidence = deal.evidence || '';
      const confidence = deal.confidence || 'medium';
      
      const confClass = confidence === 'high' ? 'conf-high' : 
                        confidence === 'medium' ? 'conf-mid' : 'conf-low';
      
      const dateStr = new Date(deal.created_at).toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
      
      const activationBadge = deal.is_activation_day ? 
        '<div class="activation-badge">Activation Stream</div>' : '';
      
      return `
        <div class="deal-card" style="animation-delay:${i*0.05}s">
          <div class="deal-top">
            <div class="deal-left">
              <span class="deal-type-pill">${escapeHtml(dealType)}</span>
              <span class="post-type-label">${escapeHtml(postType)}</span>
              ${activationBadge}
            </div>
            <div class="conf-pill ${confClass}">${confidence}</div>
          </div>
          ${evidence ? `<div class="deal-evidence">"${escapeHtml(evidence)}"</div>` : ''}
          <div class="deal-meta">
            📅 ${dateStr} · ${platformUpper}
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="creator-section">
        <div class="creator-header">
          <span class="creator-handle">${escapeHtml(username)}</span>
          <div class="platform-badge ${platformClass}" title="${platformUpper}">
            ${platformUpper.slice(0, 1)}
          </div>
        </div>
        ${dealsHtml}
      </div>
    `;
  }).join('');

  el.innerHTML = html;
}

function renderEmptyState(headerEl, contentEl, brandName) {
  headerEl.innerHTML = `
    <div class="brand-header-left">
      <h1 class="brand-header-title">${escapeHtml(brandName)}</h1>
    </div>
  `;
  
  contentEl.innerHTML = `
    <div class="empty-state">
      <div class="empty-state-icon">📭</div>
      <div class="empty-state-text">No deals found for <strong>${escapeHtml(brandName)}</strong></div>
      <a href="/" class="btn-back">← Back to Dashboard</a>
    </div>
  `;
}

function escapeHtml(text) {
  const map = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  };
  return text.replace(/[&<>"']/g, m => map[m]);
}

// Generate and download brand report
async function generateBrandReport() {
  const btn = document.getElementById('generate-report-btn');
  let token;
  
  try {
    // Refresh token if expired, then get valid token
    token = await getValidToken();
    
    if (!token) {
      alert('Not authenticated. Please log in first.');
      return;
    }
  } catch (err) {
    console.error('[Brand Report] Token error:', err);
    alert('Token refresh failed. Please log in again.');
    return;
  }
  
  if (!brandName) {
    alert('Brand name not found.');
    return;
  }
  
  // Disable button and show loading state
  btn.disabled = true;
  btn.textContent = '⏳ Generating...';
  
  try {
    // Call the report endpoint
    const response = await fetch(`/api/brands/${encodeURIComponent(brandName)}/report`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        format: 'json',
        include_evidence: true
      })
    });
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }
    
    const reportData = await response.json();
    
    if (!reportData.content) {
      throw new Error('No report content received');
    }
    
    // Generate HTML report from content
    downloadBrandReportPDF(brandName, reportData.content);
    
    // Update button
    btn.textContent = '✓ Report Generated';
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = 'Generate Report';
    }, 2000);
    
  } catch (error) {
    console.error('[Brand Report] Error:', error);
    btn.disabled = false;
    btn.textContent = 'Generate Report';
    alert(`Failed to generate report: ${error.message}`);
  }
}

// Download brand report as PDF
function downloadBrandReportPDF(brandName, content) {
  // Generate HTML report
  const html = generateBrandReportHTML(brandName, content);
  
  // Create blob and download
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  
  // Format date for filename
  const dateStr = new Date().toISOString().split('T')[0];
  link.download = `${brandName}-report-${dateStr}.html`;
  link.href = url;
  
  link.click();
  URL.revokeObjectURL(url);
  
  console.log(`[Brand Report] Downloaded: ${link.download}`);
}

// Generate HTML report from content
function generateBrandReportHTML(brandName, content) {
  const {
    total_deals = 0,
    creators_count = 0,
    high_confidence_deals = 0,
    activation_streams = 0,
    platform_breakdown = {},
    deal_types = [],
    post_types = [],
    date_range = {},
    deals = []
  } = content;
  
  const reportDate = new Date().toLocaleDateString('en-US', {
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  });
  
  const earliestDate = date_range.earliest ? new Date(date_range.earliest).toLocaleDateString() : 'N/A';
  const latestDate = date_range.latest ? new Date(date_range.latest).toLocaleDateString() : 'N/A';
  
  // Group deals by creator
  const dealsByCreator = {};
  deals.forEach(deal => {
    if (!dealsByCreator[deal.username]) {
      dealsByCreator[deal.username] = [];
    }
    dealsByCreator[deal.username].push(deal);
  });
  
  // Platform breakdown HTML
  const platformBreakdownHtml = Object.entries(platform_breakdown)
    .map(([platform, count]) => `<li>${platform.toUpperCase()}: <strong>${count}</strong> deals</li>`)
    .join('');
  
  // Deals table HTML
  const dealsTableHtml = Object.entries(dealsByCreator)
    .map(([creator, creatorDeals]) => {
      const dealsHtml = creatorDeals.map(d => `
        <tr>
          <td>${d.deal_type || 'Unknown'}</td>
          <td>${d.post_type || 'Unknown'}</td>
          <td>${d.is_activation_day ? '✓ Activation' : '—'}</td>
          <td>${d.confidence || 'medium'}</td>
          <td>${d.evidence ? `"${d.evidence.substring(0, 100)}..."` : '—'}</td>
          <td>${new Date(d.created_at).toLocaleDateString()}</td>
        </tr>
      `).join('');
      
      const platformBadge = creatorDeals[0] ? creatorDeals[0].platform : 'Unknown';
      
      return `
        <tr style="background:#f5f5f5">
          <td colspan="6"><strong>@${creator}</strong> (${platformBadge?.toUpperCase() || 'Unknown'})</td>
        </tr>
        ${dealsHtml}
      `;
    })
    .join('');
  
  return `
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <title>${brandName} Brand Report</title>
      <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; margin: 40px; }
        h1 { color: #222; border-bottom: 3px solid #007bff; padding-bottom: 10px; }
        h2 { color: #444; margin-top: 30px; font-size: 18px; }
        .header { margin-bottom: 30px; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin: 20px 0; }
        .stat-box { background: #f0f0f0; padding: 15px; border-radius: 5px; }
        .stat-box strong { display: block; font-size: 24px; color: #007bff; }
        .stat-box span { font-size: 12px; color: #666; }
        .breakdown { margin: 20px 0; }
        .breakdown ul { list-style: none; padding-left: 0; }
        .breakdown li { padding: 5px 0; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 10px; text-align: left; border: 1px solid #ddd; font-size: 12px; }
        th { background: #007bff; color: white; }
        .evidence { max-width: 250px; word-wrap: break-word; }
        .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #ddd; font-size: 12px; color: #999; }
      </style>
    </head>
    <body>
      <div class="header">
        <h1>${brandName} — Brand Intelligence Report</h1>
        <p>Report Date: <strong>${reportDate}</strong></p>
        <p>Analysis Period: <strong>${earliestDate}</strong> to <strong>${latestDate}</strong></p>
      </div>
      
      <div class="stats">
        <div class="stat-box">
          <strong>${total_deals}</strong>
          <span>Total Deals</span>
        </div>
        <div class="stat-box">
          <strong>${creators_count}</strong>
          <span>Creator${creators_count !== 1 ? 's' : ''}</span>
        </div>
        <div class="stat-box">
          <strong>${high_confidence_deals}</strong>
