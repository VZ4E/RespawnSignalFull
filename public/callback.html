<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Signing in...</title>
<style>
body { margin:0; display:flex; align-items:center; justify-content:center; height:100vh; font-family:'Sora',sans-serif; background:#f8fafc; }
.msg { text-align:center; color:#475569; font-size:14px; }
.spin { width:32px; height:32px; border:3px solid #e2e8f0; border-top-color:#5AA0E8; border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 16px; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="msg">
  <div class="spin"></div>
  <div id="status">Completing sign in...</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(async () => {
  const sb = supabase.createClient(
    'https://ehkvtwvtmvgtkqqotujo.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoa3Z0d3Z0bXZndGtxcW90dWpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NjEzODksImV4cCI6MjA4OTEzNzM4OX0.u7GA8thsQfpD1hdnQuocENuYaH79Y277AOm2Trg4Yz4'
  );

  // Get code from URL
  const code = new URLSearchParams(window.location.search).get('code');

  if (!code) {
    document.getElementById('status').textContent = 'No auth code found. Redirecting...';
    setTimeout(() => window.location.href = '/', 1500);
    return;
  }

  try {
    const { data, error } = await sb.auth.exchangeCodeForSession(code);
    if (error) throw error;

    const token = data?.session?.access_token;
    if (!token) throw new Error('No token returned');

    localStorage.setItem('rs_token', token);
    window.location.href = '/';
  } catch(e) {
    document.getElementById('status').textContent = 'Sign in failed: ' + e.message;
    console.error(e);
    setTimeout(() => window.location.href = '/', 3000);
  }
})();
</script>
</body>
</html>
