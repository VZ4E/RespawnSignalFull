<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Signing in...</title>
<style>
body { margin:0; display:flex; align-items:center; justify-content:center; height:100vh; font-family:'Sora',sans-serif; background:#f8fafc; }
.msg { text-align:center; color:#475569; font-size:14px; }
.spin { width:32px; height:32px; border:3px solid #e2e8f0; border-top-color:#5AA0E8; border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 16px; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="msg">
  <div class="spin"></div>
  Completing sign in...
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://ehkvtwvtmvgtkqqotujo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoa3Z0d3Z0bXZndGtxcW90dWpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NjEzODksImV4cCI6MjA4OTEzNzM4OX0.u7GA8thsQfpD1hdnQuocENuYaH79Y277AOm2Trg4Yz4';

async function handleCallback() {
  try {
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // This handles the code exchange automatically
    const { data, error } = await sb.auth.getSession();

    if (error) throw error;

    if (data?.session?.access_token) {
      localStorage.setItem('rs_token', data.session.access_token);
      window.location.href = '/';
    } else {
      // Try exchanging the code manually from URL
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      if (code) {
        const { data: exchanged, error: exErr } = await sb.auth.exchangeCodeForSession(code);
        if (exErr) throw exErr;
        if (exchanged?.session?.access_token) {
          localStorage.setItem('rs_token', exchanged.session.access_token);
        }
      }
      window.location.href = '/';
    }
  } catch(e) {
    console.error('OAuth callback error:', e);
    window.location.href = '/?auth_error=' + encodeURIComponent(e.message);
  }
}

handleCallback();
</script>
</body>
</html>
