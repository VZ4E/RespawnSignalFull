<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Signing in...</title>
<style>
body { margin:0; display:flex; align-items:center; justify-content:center; height:100vh; font-family:'Sora',sans-serif; background:#f8fafc; }
.msg { text-align:center; color:#475569; font-size:14px; }
.spin { width:32px; height:32px; border:3px solid #e2e8f0; border-top-color:#5AA0E8; border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 16px; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="msg">
  <div class="spin"></div>
  <div id="status">Signing in...</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(async () => {
  const sb = supabase.createClient(
    'https://ehkvtwvtmvgtkqqotujo.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoa3Z0d3Z0bXZndGtxcW90dWpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NjEzODksImV4cCI6MjA4OTEzNzM4OX0.u7GA8thsQfpD1hdnQuocENuYaH79Y277AOm2Trg4Yz4'
  );

  try {
    // Try hash fragment first (implicit flow)
    const hash = window.location.hash?.substring(1);
    if (hash) {
      const params = new URLSearchParams(hash);
      const accessToken = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      if (accessToken) {
        localStorage.setItem('rs_token', accessToken);
        if (refreshToken) localStorage.setItem('refreshToken', refreshToken);
        window.location.href = '/';
        return;
      }
    }

    // Try query param (PKCE flow)
    const search = new URLSearchParams(window.location.search);
    const code = search.get('code');
    if (code) {
      const { data, error } = await sb.auth.exchangeCodeForSession(code);
      if (error) throw error;
      if (data?.session?.access_token) {
        localStorage.setItem('rs_token', data.session.access_token);
        if (data.session.refresh_token) localStorage.setItem('refreshToken', data.session.refresh_token);
        window.location.href = '/';
        return;
      }
    }

    // Try getSession as fallback — Supabase JS may have set it automatically
    const { data: sessionData } = await sb.auth.getSession();
    if (sessionData?.session?.access_token) {
      localStorage.setItem('rs_token', sessionData.session.access_token);
      if (sessionData.session.refresh_token) localStorage.setItem('refreshToken', sessionData.session.refresh_token);
      window.location.href = '/';
      return;
    }

    // Nothing worked
    document.getElementById('status').textContent = 'Sign in failed — no token received. Redirecting...';
    setTimeout(() => window.location.href = '/', 2000);

  } catch(e) {
    console.error('Callback error:', e);
    document.getElementById('status').textContent = 'Error: ' + e.message;
    setTimeout(() => window.location.href = '/', 3000);
  }
})();
</script>
</body>
</html>
